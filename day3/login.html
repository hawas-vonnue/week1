<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Login page</title>
  </head>
  <body>
    <main>
      <h1>Login Page</h1>
      <form>
        <label for="email">Email:*</label>
        <input id="email" type="email" autocomplete="email" required />
        <br />
        <!--for accessibility-->
        <br />
        <label for="password">Password:*</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          aria-describedby="pass_para"
          required
        />
        <button type="button" aria-pressed="false">show/hide</button>
        <p id="pass_para">Must be atleast 8 characters</p>
        <input id="checkbox" type="checkbox" name="remember me" />
        <label for="checkbox">remember me</label>
        <br />
        <br />
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
