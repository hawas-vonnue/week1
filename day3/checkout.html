<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Payment checkout Form</title>
  </head>
  <body>
    <main>
      <h1>Payment checkout Form</h1>
      <form>
        <fieldset>
          <legend>Fields marked * are required</legend>
          <fieldset>
            <legend>Delivery Address</legend>
            <label for="fullname">Full name:*</label>
            <input id="fullname" type="text" required />
            <br />
            <br />
            <label for="addr1">Address line 1*:</label>
            <input id="addr1" type="text" required />
            <br />
            <br />
            <label for="addr2">Address line 2:</label>
            <input id="addr2" type="text" />
            <br />
            <br />
            <label for="city">city:*</label>
            <input type="text" id="city" required />
            <br />
            <br />
            <label for="postcode">postcode:*</label>
            <input id="postcode" type="number" required />
            <br />
            <br />
            <label for="country">country:*</label>
            <input type="text" id="country" list="countries" required />
            <datalist id="countries">
              <option value="India"></option>
              <option value="US"></option>
              <option value="Afghanistan"></option>
              <option value="Pakistan"></option>
              <option value="Bangladesh"></option>
              <option value="UK"></option>
              <option value="Canada"></option>
              <option value="Argentina"></option>
              <option value="Spain"></option>
              <option value="Portugal"></option>
              <option value="Turkey"></option>
              <option value="UAE"></option>
              <option value="Iraq"></option>
              <option value="Iran"></option>
              <option value="Israel"></option>
              <option value="Palestine"></option>
              <option value="Russia"></option>
              <option value="Ukraine"></option>
              <option value="China"></option>
              <option value="Dubai"></option>
            </datalist>
          </fieldset>
          <fieldset>
            <legend>Payment Details</legend>
            <label for="cardnumber">card number:*</label>
            <input type="text" maxlength="16" id="cardnumber" pattern="[0-9]*" required />
            <br />
            <br />
            <label for="expiry">Enter expiry month and year:*</label>
            <input type="month" id="expiry" value="2026-06" required />
            <br />
            <br />
            <label for="cvv">CVV:*</label>
            <input type="password" aria-describedby="tooltippara" maxlength="4" required id="cvv" />
            <p id="tooltippara">3 or 4 digits on the back of your card</p>
          </fieldset>
          <fieldset>
            <legend>Order Notes</legend>
            <label for="txt">Type your order notes here(max length 500 characters):</label>
            <br />
            <textarea name="ordernotes" id="txt" maxlength="500"></textarea>
          </fieldset>
        </fieldset>
        <input type="submit" />
      </form>
    </main>
  </body>
</html>
